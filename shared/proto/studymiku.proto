syntax = "proto3";
package studymiku;
import "google/protobuf/timestamp.proto";

// --- Enums ---

enum HookTrigger {
  HOOK_TRIGGER_UNSPECIFIED = 0;
  HOOK_FOCUS_START = 1;
  HOOK_FOCUS_PAUSE = 2;
  HOOK_FOCUS_RESUME = 3;
  HOOK_FOCUS_COMPLETED = 4;
  HOOK_FOCUS_CANCELLED = 5;
  HOOK_FOCUS_SKIPPED = 6;
  HOOK_BREAK_START = 7;
  HOOK_BREAK_COMPLETED = 8;
  HOOK_BREAK_CANCELLED = 9;
  HOOK_BREAK_SKIPPED = 10;
  HOOK_FOCUS_TICK = 11;
  HOOK_BREAK_TICK = 12;
}

enum HookProvider {
  HOOK_PROVIDER_UNSPECIFIED = 0;
  PROVIDER_NOTIFICATION = 1;
  PROVIDER_SOUND = 2;
  PROVIDER_PUSH = 3;
  PROVIDER_ESTIM = 4;
}

enum FocusMode {
  FOCUS_MODE_UNSPECIFIED = 0;
  FOCUS = 1;
  SHORT_BREAK = 2;
  LONG_BREAK = 3;
}

enum CompletionType {
  COMPLETION_TYPE_UNSPECIFIED = 0;
  COMPLETED = 1;
  CANCELLED = 2;
  SKIPPED = 3;
  INTERRUPTED = 4;
  DISABLED = 5;
}

enum PlaylistMode {
  PLAYLIST_MODE_UNSPECIFIED = 0;
  PLAYLIST = 1;
  COLLECTION = 2;
}

enum PlaylistSource {
  PLAYLIST_SOURCE_UNSPECIFIED = 0;
  NETEASE = 1;
  TENCENT = 2;
  SPOTIFY = 3;
  LOCAL = 4;
}

// --- Data Messages ---

message FocusRecord {
  string id = 1;
  FocusMode mode = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  int32 duration = 5;
  int32 elapsed = 6;
  CompletionType completion_type = 7;
  optional google.protobuf.Timestamp updated_at = 8;
}

message FocusRecords {
  repeated FocusRecord records = 1;
}

message FocusSettings {
  int32 focus_duration = 1;
  int32 short_break_duration = 2;
  int32 long_break_duration = 3;
  int32 long_break_interval = 4;
  bool auto_start_breaks = 5;
  bool auto_start_focus = 6;
  reserved 7, 8;
}

message Song {
  string id = 1;
  string name = 2;
  optional string artist = 3;
  optional string url = 4;
  optional string cover = 5;
  optional string lrc = 6;
}

message PlaylistItem {
  string id = 1;
  string name = 2;
  optional string cover = 3;
  int32 order = 4;
  PlaylistMode mode = 5;
  optional PlaylistSource source = 6;
  optional string source_id = 7;
  repeated Song songs = 8;
}

message Playlists {
  repeated PlaylistItem playlists = 1;
  optional string current_id = 2;
  optional string default_id = 3;
}

message MediaSettings {
  int32 current_index = 1;
  optional int32 current_song_index = 2;
}

message UserSettings {
  optional MediaSettings video = 1;
  optional MediaSettings music = 2;
}

message ShareConfigModules {
  bool basic_stats = 1;
  bool mini_heatmap = 2;
  bool trend_chart = 3;
}

message ShareConfig {
  ShareConfigModules modules = 1;
  bool show_hitokoto = 2;
  repeated string hitokoto_categories = 3;
}

// --- Wire Protocol ---

// Provider-specific action messages
message NotificationAction {
  string title = 1;
  string body = 2;
  optional string tag = 3;
}

message SoundAction {
  string sound_id = 1;
  float volume = 2;
}

message PushAction {
  string title = 1;
  string body = 2;
}

message EstimAction {
  string type = 1;
  string channel = 2;
  int32 value = 3;
  repeated string patterns = 4;
  int32 duration_ms = 5;
  optional string audio_file_id = 6;
}

message HookAction {
  oneof action {
    NotificationAction notification = 1;
    SoundAction sound = 2;
    PushAction push = 3;
    EstimAction estim = 4;
  }
}

message Hook {
  string id = 1;
  bool enabled = 2;
  string name = 3;
  HookProvider provider = 4;
  HookTrigger trigger = 5;
  int32 tick_interval = 6;
  bool built_in = 7;
  HookAction action = 8;
}

message HookSettings {
  repeated Hook hooks = 1;
}

message SyncRequest {
  optional int32 version = 1;
  oneof data {
    FocusRecords focus_records = 10;
    FocusSettings focus_settings = 11;
    Playlists playlists = 12;
    UserSettings user_settings = 13;
    ShareConfig share_config = 14;
    HookSettings hook_settings = 15;
  }
}

message SyncResponse {
  string type = 1;
  int32 version = 2;
  bool success = 3;
  optional string error = 4;
  optional string code = 5;
  bool conflict = 6;
  optional int32 server_version = 7;
  optional bool merged = 8;
  oneof data {
    FocusRecords focus_records = 10;
    FocusSettings focus_settings = 11;
    Playlists playlists = 12;
    UserSettings user_settings = 13;
    ShareConfig share_config = 14;
    HookSettings hook_settings = 15;
  }
  oneof server_data {
    FocusRecords server_focus_records = 20;
    FocusSettings server_focus_settings = 21;
    Playlists server_playlists = 22;
    UserSettings server_user_settings = 23;
    ShareConfig server_share_config = 24;
    HookSettings server_hook_settings = 25;
  }
}
